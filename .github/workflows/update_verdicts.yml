name: Update Verdicts
on:
  schedule:
    - cron: '0 * * * *'  # Каждый час
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: pip install -r requirements.txt
      - name: Run updater
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SSTATS_API_KEY: ${{ secrets.SSTATS_API_KEY }}
        run: python update_verdicts.py
